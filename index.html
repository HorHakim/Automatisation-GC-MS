for(var i=0;i<SLIDES.length;i++){
  var d=document.createElement('button');
  d.className='dot-nav'+(i===0?' active':'');
  d.setAttribute('data-i',i);
  d.onclick=function(){go(parseInt(this.getAttribute('data-i')));};
  dots.appendChild(d);
}

btnPrev.onclick=function(){go(current-1);};
btnNext.onclick=function(){go(current+1);};

function render(){
  area.innerHTML=SLIDES[current]();
  var allDots=dots.querySelectorAll('.dot-nav');
  for(var i=0;i<allDots.length;i++) allDots[i].className='dot-nav'+(i===current?' active':'');
  btnPrev.disabled=current===0;
  btnNext.disabled=current===SLIDES.length-1;
  requestAnimationFrame(function(){
    var s=document.getElementById('s');
    if(s) s.classList.add('visible');
  });
}

function go(idx){
  if(idx<0||idx>=SLIDES.length||idx===current) return;
  var s=document.getElementById('s');
  if(s){s.style.opacity='0';s.style.transform='translateY(-8px)';}
  setTimeout(function(){current=idx;render();},250);
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(current+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();go(current-1);}
});

render();
</script>
</body>
</html>
